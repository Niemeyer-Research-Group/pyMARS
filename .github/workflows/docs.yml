name: Deploy Docs

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]

jobs:
  deploy:
    # Only deploy from the official repository, never from forks, and only when CI passed.
    if: |
      github.repository == 'Niemeyer-Research-Group/pyMARS' &&
      github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          cache: pip

      - name: Install package and doc dependencies
        run: |
            python -m pip install --upgrade pip
            pip install .[dev]
            pip install sphinx nbsphinx ipython sphinxcontrib-bibtex

      - name: Build docs
        run: sphinx-build -b html docs/ docs/_build/html

      - name: Deploy
        uses: peaceiris/actions-gh-pages@v4
        with:
            github_token: ${{ secrets.GITHUB_TOKEN }}
            publish_dir: ./docs/_build/html
