name: Publish

# PyPI publishing is disabled pending resolution of the PyPI name conflict.
# The 'pymars' name on PyPI is held by an unrelated project (mars-project/mars)
# that has been inactive since January 2023. A PEP 541 name reclaim request is
# in progress. Re-enable by removing the event_name condition on the build/publish
# jobs once the name is recovered.
#
# Conda publishing triggers automatically after CI passes on a v* tag.
# PyPI publishing is manual (workflow_dispatch) only for now.
on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
  workflow_dispatch:

jobs:
  build:
    name: Build distribution
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.14'

    - name: Install build tools
      run: |
        python -m pip install --upgrade pip
        pip install build

    - name: Build sdist and wheel
      run: python -m build

    - name: Upload distribution artifacts
      uses: actions/upload-artifact@v4
      with:
        name: dist
        path: dist/

  publish:
    name: Publish to PyPI
    if: github.event_name == 'workflow_dispatch'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/pymars
    permissions:
      id-token: write

    steps:
    - name: Download distribution artifacts
      uses: actions/download-artifact@v4
      with:
        name: dist
        path: dist/

    - name: Publish to PyPI
      uses: pypa/gh-action-pypi-publish@release/v1

  conda:
    name: Build and publish to Anaconda.org
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success' &&
       startsWith(github.event.workflow_run.head_branch, 'v'))
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash -el {0}

    steps:
    - uses: actions/checkout@v4
      with:
        ref: ${{ github.event.workflow_run.head_sha || github.sha }}

    - name: Set up conda
      uses: conda-incubator/setup-miniconda@v3
      with:
        channels: conda-forge,defaults
        channel-priority: strict
        python-version: '3.14'
        auto-activate-base: true

    - name: Install conda-build and anaconda-client
      run: conda install -y conda-build anaconda-client

    - name: Build conda package
      run: conda build conda.recipe/ --output-folder dist-conda/

    - name: Upload to Anaconda.org
      env:
        ANACONDA_API_TOKEN: ${{ secrets.ANACONDA_API_TOKEN }}
      run: |
        anaconda -t "$ANACONDA_API_TOKEN" upload \
          --user niemeyer-research-group \
          dist-conda/noarch/pymars-*.tar.bz2
