name: Publish

# pyMARS is distributed on PyPI as 'nrg-pymars' (the 'pymars' name belongs to an
# unrelated, active project). The import package and CLI remain 'pymars'.
#
# Publishing to PyPI runs only on pushes of version tags (v*). The CI test suite
# runs first (as a reusable workflow) and must pass before any build or publish
# job runs. Conda packages are published through conda-forge (the nrg-pymars
# feedstock), whose bot opens a release PR for each new PyPI version automatically,
# so no conda build/upload job is needed here.
on:
  push:
    tags:
      - 'v*'

jobs:
  test:
    name: Test
    # Only run on the official repository, never on forks.
    if: github.repository == 'Niemeyer-Research-Group/pyMARS'
    uses: ./.github/workflows/ci.yml

  build:
    name: Build distribution
    if: github.repository == 'Niemeyer-Research-Group/pyMARS'
    needs: test
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.14'

    - name: Install build tools
      run: |
        python -m pip install --upgrade pip
        pip install build

    - name: Build sdist and wheel
      run: python -m build

    - name: Upload distribution artifacts
      uses: actions/upload-artifact@v4
      with:
        name: dist
        path: dist/

  publish:
    name: Publish to PyPI
    if: github.repository == 'Niemeyer-Research-Group/pyMARS'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/nrg-pymars
    permissions:
      id-token: write

    steps:
    - name: Download distribution artifacts
      uses: actions/download-artifact@v4
      with:
        name: dist
        path: dist/

    - name: Publish to PyPI
      uses: pypa/gh-action-pypi-publish@release/v1
