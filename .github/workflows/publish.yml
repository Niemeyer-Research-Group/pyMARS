name: Publish

# pyMARS is distributed on PyPI as 'nrg-pymars' (the 'pymars' name belongs to an
# unrelated, active project). The import package and CLI remain 'pymars'.
#
# Publishing to PyPI and Anaconda.org runs only on pushes of version tags (v*).
# The CI test suite runs first (as a reusable workflow) and must pass before any
# build or publish job runs.
on:
  push:
    tags:
      - 'v*'

jobs:
  test:
    name: Test
    uses: ./.github/workflows/ci.yml

  build:
    name: Build distribution
    needs: test
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.14'

    - name: Install build tools
      run: |
        python -m pip install --upgrade pip
        pip install build

    - name: Build sdist and wheel
      run: python -m build

    - name: Upload distribution artifacts
      uses: actions/upload-artifact@v4
      with:
        name: dist
        path: dist/

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/nrg-pymars
    permissions:
      id-token: write

    steps:
    - name: Download distribution artifacts
      uses: actions/download-artifact@v4
      with:
        name: dist
        path: dist/

    - name: Publish to PyPI
      uses: pypa/gh-action-pypi-publish@release/v1

  conda:
    name: Build and publish to Anaconda.org
    needs: test
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash -el {0}

    steps:
    - uses: actions/checkout@v4

    - name: Set up conda
      uses: conda-incubator/setup-miniconda@v3
      with:
        miniconda-version: latest
        channels: conda-forge
        channel-priority: strict
        auto-activate-base: true

    - name: Install conda-build and anaconda-client
      run: conda install -n base -c conda-forge -y conda-build anaconda-client

    - name: Build conda package
      run: conda build conda.recipe/ --output-folder dist-conda/

    - name: Upload to Anaconda.org
      env:
        ANACONDA_API_TOKEN: ${{ secrets.ANACONDA_API_TOKEN }}
      run: |
        shopt -s nullglob
        anaconda -t "$ANACONDA_API_TOKEN" upload --user niemeyer-research-group \
          dist-conda/noarch/pymars-*.conda dist-conda/noarch/pymars-*.tar.bz2
